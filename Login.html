<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowi - Billetera Digital</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Favicons -->
  <link href="./assets/img/logoFav.ico" sizes="48x48" rel="icon">
    <style>
        .gradient-custom-2 {
            background-image: url('https://img.freepik.com/free-vector/shiny-dark-blue-bitcoin-background_1017-10083.jpg'); /* Imagen relacionada con criptomonedas */
            background-size: cover;
            background-position: center;
        }

        @media (min-width: 768px) {
            .gradient-form {
                height: 100vh !important;
            }
        }

        @media (min-width: 769px) {
            .gradient-custom-2 {
                border-top-right-radius: .3rem;
                border-bottom-right-radius: .3rem;
            }
        }

        .logo-align-left {
            display: block;
            margin-left: 0; /* Alinea el logo a la izquierda */
        }

        /* Estilo para hacer más pequeño y gris el texto de usuario y contraseña */
        .form-label {
            font-size: 0.9rem; /* Reducir tamaño de fuente */
            color: #6c757d; /* Gris claro */
        }

        .form-control {
            font-size: 0.9rem; /* Reducir tamaño de la fuente en los campos de entrada */
        }

        .form-control::placeholder {
            font-size: 0.85rem; /* Reducir tamaño del texto en el placeholder */
            color: #6c757d; /* Gris para el placeholder */
        }

        p {
            font-size: 1.2rem; /* Aumentar el tamaño del texto "Por favor, inicia sesión" */
        }

        /* Reducción de separación entre campos */
        .form-outline {
            margin-bottom: 1.5rem; /* Reducir la separación entre campos */
        }

        /* Botón con color personalizado */
        .btn-primary {
            background-color: #2242c6; /* Cambiar el color de fondo */
            border-color:#2242c6; /* Cambiar el borde del botón */
        }

        .btn-primary:hover {
            background-color: #2242c6; /* Un color más claro cuando el mouse pasa por encima */
            border-color: #2242c6; /* También cambiar el borde al pasar el mouse */
        }
    </style>
</head>
<body>
    <section class="h-100 gradient-form" style="background-color: #eee;">
        <div class="container py-5 h-100">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-xl-10">
                    <div class="card rounded-3 text-black">
                        <div class="row g-0">
                            <div class="col-lg-6">
                                <div class="card-body p-md-5 mx-md-4">
                                    <div class="text-left">
                                        <img src="./assets/img/Cortado.png" style="width: 130px;" alt="logo" class="logo-align-left">
                                    </div>
                                    <form>
                                        <p>Por favor, inicia sesión en tu cuenta</p>
                                        <div data-mdb-input-init class="form-outline">
                                            <label class="form-label" for="form2Example11">Usuario</label>
                                            <input type="email" id="form2Example11" class="form-control" placeholder="Introduce tu correo electrónico" />
                                        </div>
                                        <div data-mdb-input-init class="form-outline">
                                            <label class="form-label" for="form2Example22">Contraseña</label>
                                            <input type="password" id="form2Example22" class="form-control" placeholder="Escribe tu contraseña" />
                                        </div>
                                        <div class="text-center pt-1 mb-5 pb-1">
                                            <button data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-block fa-lg mb-3" type="button">Iniciar sesión</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                            <div class="col-lg-6 d-flex align-items-center gradient-custom-2">
                                <div class="text-white px-3 py-4 p-md-5 mx-md-4">
                                    <!-- Se elimina la imagen dentro del div -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
